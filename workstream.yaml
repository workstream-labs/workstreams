agent:
  command: claude
  args:
    - -p
  acceptAll: true
  timeout: 600
workstreams:
  diff-ui:
    prompt: when ws diff <feature> will be called, it should open a nice looking
      editor in terminal with proper side by side split OR one after another
      diff checker, this view options should be toogleable. For look take
      inspiration from intellij how on left side show all changed files, and on
      right shows actual changed file with proper diff view and colours. For
      interaction on this editor ui on the top of temrinal take inspiration from
      claude code cli
    plan_first: true
  checkout-interaction:
    prompt: ws cheackout interaction should be similar to the way we do interaction
      with claude code cli
    plan_first: true
