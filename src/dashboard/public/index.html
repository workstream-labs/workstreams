<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workstream Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; }

  #dag-panel { flex: 0 0 60%; padding: 20px; overflow: auto; border-right: 1px solid #30363d; }
  #detail-panel { flex: 0 0 40%; padding: 20px; overflow: auto; display: flex; flex-direction: column; }

  h1 { font-size: 18px; margin-bottom: 16px; color: #58a6ff; }
  h2 { font-size: 14px; margin-bottom: 8px; color: #8b949e; }

  svg { width: 100%; min-height: 300px; }

  .node rect { rx: 8; ry: 8; stroke-width: 2; cursor: pointer; transition: all 0.3s; }
  .node rect:hover { filter: brightness(1.2); }
  .node text { font-size: 12px; fill: #c9d1d9; pointer-events: none; font-family: monospace; }
  .node .type-badge { font-size: 9px; fill: #8b949e; }

  .edge { stroke: #30363d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }

  .status-pending rect { fill: #21262d; stroke: #30363d; }
  .status-queued rect { fill: #1c2537; stroke: #388bfd; }
  .status-running rect { fill: #0d2347; stroke: #58a6ff; stroke-dasharray: 5,3; }
  .status-success rect { fill: #0d2d1a; stroke: #3fb950; }
  .status-failed rect { fill: #3d1419; stroke: #f85149; }
  .status-skipped rect { fill: #2d2200; stroke: #d29922; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .status-running rect { animation: pulse 2s infinite; }

  #detail-panel .section { margin-bottom: 16px; }
  #detail-panel .label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
  #detail-panel .value { font-size: 13px; padding: 8px; background: #161b22; border-radius: 6px; border: 1px solid #30363d; }
  #detail-panel pre { font-size: 12px; padding: 12px; background: #0d1117; border-radius: 6px; border: 1px solid #30363d; overflow: auto; white-space: pre-wrap; word-wrap: break-word; max-height: 40vh; flex: 1; }

  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-pending { background: #21262d; color: #8b949e; }
  .badge-queued { background: #1c2537; color: #388bfd; }
  .badge-running { background: #0d2347; color: #58a6ff; }
  .badge-success { background: #0d2d1a; color: #3fb950; }
  .badge-failed { background: #3d1419; color: #f85149; }
  .badge-skipped { background: #2d2200; color: #d29922; }

  #no-selection { color: #484f58; text-align: center; padding-top: 40%; font-size: 14px; }

  .run-info { font-size: 12px; color: #8b949e; margin-bottom: 16px; padding: 8px; background: #161b22; border-radius: 6px; }
</style>
</head>
<body>

<div id="dag-panel">
  <h1>Workstream DAG</h1>
  <div class="run-info" id="run-info">Loading...</div>
  <svg id="dag-svg"></svg>
</div>

<div id="detail-panel">
  <h1>Details</h1>
  <div id="no-selection">Click a node to view details</div>
  <div id="detail-content" style="display:none">
    <div class="section">
      <div class="label">Name</div>
      <div class="value" id="d-name"></div>
    </div>
    <div class="section">
      <div class="label">Status</div>
      <div class="value"><span class="status-badge" id="d-status"></span></div>
    </div>
    <div class="section">
      <div class="label">Type</div>
      <div class="value" id="d-type"></div>
    </div>
    <div class="section">
      <div class="label">Prompt</div>
      <div class="value" id="d-prompt" style="max-height:120px;overflow:auto"></div>
    </div>
    <div class="section" style="flex:1;display:flex;flex-direction:column">
      <div class="label">Log Output</div>
      <pre id="d-log">No log output yet</pre>
    </div>
  </div>
</div>

<script>
let state = null;
let selectedNode = null;

async function fetchState() {
  const res = await fetch('/api/state');
  state = await res.json();
  render();
}

function render() {
  if (!state || !state.currentRun) {
    document.getElementById('run-info').textContent = 'No active run';
    return;
  }

  const run = state.currentRun;
  const ws = run.workstreams;
  const names = Object.keys(ws);

  document.getElementById('run-info').innerHTML =
    `Run: <strong>${run.runId}</strong> | Started: ${new Date(run.startedAt).toLocaleTimeString()}` +
    (run.finishedAt ? ` | Finished: ${new Date(run.finishedAt).toLocaleTimeString()}` : ' | <em>Running...</em>');

  renderDAG(ws);
}

function renderDAG(ws) {
  const names = Object.keys(ws);
  if (!names.length) return;

  // Build adjacency for layout
  const deps = {};
  const levels = {};
  for (const name of names) {
    deps[name] = []; // will be filled from config if available
  }

  // Simple level assignment: nodes without deps = level 0, others = max(dep levels) + 1
  // Since we don't have the config deps in state, use a flat layout
  // We'll do a simple grid layout
  const nodeWidth = 160;
  const nodeHeight = 40;
  const gapX = 40;
  const gapY = 60;
  const cols = Math.ceil(Math.sqrt(names.length));

  const positions = {};
  names.forEach((name, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    positions[name] = {
      x: 30 + col * (nodeWidth + gapX),
      y: 30 + row * (nodeHeight + gapY)
    };
  });

  const svgWidth = 30 + cols * (nodeWidth + gapX);
  const svgHeight = 30 + Math.ceil(names.length / cols) * (nodeHeight + gapY);

  const svg = document.getElementById('dag-svg');
  svg.setAttribute('viewBox', `0 0 ${svgWidth} ${svgHeight}`);
  svg.innerHTML = `
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#30363d" />
      </marker>
    </defs>
  `;

  // Render nodes
  for (const name of names) {
    const w = ws[name];
    const pos = positions[name];
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', `node status-${w.status}`);
    g.setAttribute('data-name', name);
    g.onclick = () => selectNode(name);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', pos.x);
    rect.setAttribute('y', pos.y);
    rect.setAttribute('width', nodeWidth);
    rect.setAttribute('height', nodeHeight);
    g.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', pos.x + nodeWidth / 2);
    text.setAttribute('y', pos.y + 20);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    const displayName = name.length > 18 ? name.slice(0, 16) + '...' : name;
    text.textContent = displayName;
    g.appendChild(text);

    const badge = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    badge.setAttribute('x', pos.x + nodeWidth / 2);
    badge.setAttribute('y', pos.y + 33);
    badge.setAttribute('text-anchor', 'middle');
    badge.setAttribute('class', 'type-badge');
    badge.textContent = w.type;
    g.appendChild(badge);

    svg.appendChild(g);
  }
}

async function selectNode(name) {
  selectedNode = name;
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';

  const w = state.currentRun.workstreams[name];
  document.getElementById('d-name').textContent = name;
  document.getElementById('d-type').textContent = w.type;

  const statusEl = document.getElementById('d-status');
  statusEl.textContent = w.status;
  statusEl.className = `status-badge badge-${w.status}`;

  document.getElementById('d-prompt').textContent = '(prompt from config)';

  // Fetch log
  try {
    const res = await fetch(`/api/log/${name}`);
    if (res.ok) {
      document.getElementById('d-log').textContent = await res.text();
    } else {
      document.getElementById('d-log').textContent = 'No log output yet';
    }
  } catch {
    document.getElementById('d-log').textContent = 'Error fetching log';
  }
}

// SSE for live updates
const evtSource = new EventSource('/api/events');
evtSource.onmessage = (e) => {
  const event = JSON.parse(e.data);

  if (state && state.currentRun && event.name) {
    const ws = state.currentRun.workstreams[event.name];
    if (ws) {
      if (event.type.startsWith('node:')) {
        ws.status = event.type.split(':')[1];
      }
    }
  }

  render();

  // Refresh log if selected node changed
  if (selectedNode && event.name === selectedNode) {
    selectNode(selectedNode);
  }
};

// Initial load
fetchState();
// Poll state every 5s as backup
setInterval(fetchState, 5000);
</script>
</body>
</html>
